<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="calculator.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</head>

<body class="d-grid justify-content-center align-items-center vh-100">
    <h2 class="text-light fst-italic text-center">Calculator</h2>
    <div id="main" class="">
        <input type="text" id="ibox">
        <table>
            <tr>
                <td>1</td>
                <td>2</td>
                <td>3</td>
                <td>+</td>
            </tr>
            <tr>
                <td>4</td>
                <td>5</td>
                <td>6</td>
                <td>-</td>
            </tr>
            <tr>
                <td>7</td>
                <td>8</td>
                <td>9</td>
                <td>x</td>
            </tr>
            <tr>
                <td>C</td>
                <td>0</td>
                <td>/</td>
                <td>=</td>
            </tr>
        </table>
    </div>
    <script>
        var inhale = document.getElementById("ibox")
        var all = document.querySelectorAll("td")
        all.forEach(likshani => {
            likshani.addEventListener("click", () => {
                
                var priya=likshani.innerText;
                if (priya == "C") {
                    inhale.value = "";
                }

                else if (priya == "=") {
                    inhale.value = eval(inhale.value.replaceAll("x", "*"))
                }
                else {
                    inhale.value+= priya;
                }
            }

            )
        });
    </script>
</body>

</html>
